<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplicativo de Evidências</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#0f172a;
    color:white;
}

.header{
    background:#1e293b;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
    max-width: 500px;
    margin: 0 auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

label{
    display: block;
    margin-top: 15px;
    font-size: 14px;
    color: #94a3b8;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #334155;
    background: #0f172a;
    color: white;
    margin-top: 5px;
    box-sizing: border-box;
}

button{
    color:white;
    padding:14px 20px;
    border:none;
    border-radius:8px;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
}

.btn-primary {
    background:#2563eb;
    margin-top: 20px;
}
.btn-primary:active {
    background: #1d4ed8;
}

.btn-secondary {
    background: #475569;
    margin-top: 10px;
}
.btn-secondary:active {
    background: #334155;
}

.btn-success {
    background: #22c55e;
    margin-top: 30px;
}
.btn-success:active {
    background: #16a34a;
}
.btn-success:disabled {
    background: #15803d;
    cursor: not-allowed;
    opacity: 0.7;
}

/* Área de visualização e grid das fotos */
.preview-container {
    margin-top: 20px;
}

.preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.thumb-preview {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid #334155;
}

.geo-badge {
    display: none;
    background: #0f172a;
    border: 1px dashed #334155;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 14px;
    color: #38bdf8;
}

/* Alerta de sucesso simulado */
.alert-success {
    display: none;
    background: #065f46;
    border: 1px solid #059669;
    color: #a7f3d0;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
📷 Aplicativo de Evidências
</div>

<div class="container">

<div class="card">
<h2>Nova Evidência</h2>

<label>Contrato</label>
<input id="input-contrato" placeholder="Digite o contrato">

<label>Cidade</label>
<input id="input-cidade" placeholder="Digite a cidade">

<!-- Inputs ocultos para Câmera e Galeria -->
<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="gallery-input" accept="image/*" multiple style="display:none;">

<!-- Botões de Ação -->
<button id="btn-tirar-foto" class="btn-primary">Tirar Foto & Capturar GPS</button>
<button id="btn-galeria" class="btn-secondary">Adicionar Evidência do Ativo (Galeria)</button>

<!-- Área de visualização do resultado -->
<div class="preview-container">
    <div id="geo-info" class="geo-badge"></div>
    <div id="preview-grid" class="preview-grid"></div>
</div>

<!-- Botão Salvar e Alerta -->
<button id="btn-salvar" class="btn-success">Salvar Evidência</button>
<div id="alert-save" class="alert-success"></div>

</div>

</div>

<script>
const btnTirarFoto = document.getElementById('btn-tirar-foto');
const btnGaleria = document.getElementById('btn-galeria');
const btnSalvar = document.getElementById('btn-salvar');

const cameraInput = document.getElementById('camera-input');
const galleryInput = document.getElementById('gallery-input');

const previewGrid = document.getElementById('preview-grid');
const geoInfo = document.getElementById('geo-info');
const alertSave = document.getElementById('alert-save');

const inputContrato = document.getElementById('input-contrato');
const inputCidade = document.getElementById('input-cidade');

// Lista para armazenar as imagens em memória (Base64)
let listaImagens = [];
let localizacaoAtual = null;

// --- FUNÇÃO PARA ADICIONAR IMAGEM NA GRADE ---
function adicionarImagemNaGrade(base64Image) {
    listaImagens.push(base64Image);
    
    const img = document.createElement('img');
    img.src = base64Image;
    img.className = 'thumb-preview';
    previewGrid.appendChild(img);
}

// --- CONTROLE DA CÂMERA & GPS ---
btnTirarFoto.addEventListener('click', () => {
    geoInfo.style.display = 'block';
    geoInfo.textContent = "Obtendo localização GPS...";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude.toFixed(6);
                const lon = position.coords.longitude.toFixed(6);
                localizacaoAtual = { latitude: lat, longitude: lon };
                
                geoInfo.innerHTML = `📍 <strong>Localização capturada:</strong><br>Lat: ${lat} | Lon: ${lon}`;
                cameraInput.click();
            },
            (error) => {
                console.error(error);
                geoInfo.innerHTML = "⚠️ GPS não disponível. Certifique-se de permitir o acesso à localização.";
                cameraInput.click();
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    } else {
        geoInfo.textContent = "⚠️ Geolocalização não suportada.";
        cameraInput.click();
    }
});

cameraInput.addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            adicionarImagemNaGrade(e.target.result);
        }
        reader.readAsDataURL(file);
    }
});

// --- CONTROLE DA GALERIA (Múltiplas Fotos) ---
btnGaleria.addEventListener('click', () => {
    galleryInput.click();
});

galleryInput.addEventListener('change', (event) => {
    const files = event.target.files;
    if (files.length > 0) {
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            reader.onload = function(e) {
                adicionarImagemNaGrade(e.target.result);
            }
            reader.readAsDataURL(file);
        }
    }
});

// --- SIMULAÇÃO DE SALVAMENTO ---
btnSalvar.addEventListener('click', () => {
    // Validação simples
    const contrato = inputContrato.value.trim();
    const cidade = inputCidade.value.trim();

    if (!contrato || !cidade) {
        alert("Por favor, preencha os campos de Contrato e Cidade antes de salvar.");
        return;
    }

    if (listaImagens.length === 0) {
        alert("Por favor, adicione pelo menos uma evidência (Foto ou Galeria) antes de salvar.");
        return;
    }

    // Inicia simulação de salvamento
    btnSalvar.disabled = true;
    btnSalvar.textContent = "Enviando dados ao servidor...";
    alertSave.style.display = 'none';

    // Objeto consolidado que seria enviado para o Backend futuramente
    const payloadEvidencia = {
        contrato: contrato,
        cidade: cidade,
        localizacao: localizacaoAtual,
        imagens: listaImagens // Array com todas as fotos em Base64
    };

    console.log("Dados que seriam enviados ao Backend:", payloadEvidencia);

    // Simula uma resposta de rede (1.5 segundos)
    setTimeout(() => {
        // Exibe mensagem de sucesso
        alertSave.style.display = 'block';
        alertSave.innerHTML = `✅ Evidência Salva com Sucesso! (Simulado)<br>
                               <span style="font-size:12px; font-weight:normal;">
                               Contrato: ${contrato} | Imagens enviadas: ${listaImagens.length}
                               </span>`;

        // Reseta o formulário
        inputContrato.value = "";
        inputCidade.value = "";
        listaImagens = [];
        localizacaoAtual = null;
        previewGrid.innerHTML = "";
        geoInfo.style.display = 'none';

        // Reabilita o botão
        btnSalvar.disabled = false;
        btnSalvar.textContent = "Salvar Evidência";

        // Remove o alerta de sucesso após 5 segundos
        setTimeout(() => {
            alertSave.style.display = 'none';
        }, 5000);

    }, 1500);
});
</script>

</body>
</html>
