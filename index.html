<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplicativo de Evidências</title>

<!-- Biblioteca OCR Tesseract.js -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#0f172a;
    color:white;
}

.header{
    background:#1e293b;
    padding:20px;
    font-size:24px;
    font-weight:bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}

.header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
}

.btn-navigation {
    background: #475569;
    color: white;
    padding: 8px 15px;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
}

.btn-mode {
    padding: 8px 15px !important;
    font-size: 14px !important;
    width: auto !important;
    border-radius: 6px !important;
    font-weight: bold !important;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    color: white;
}

.btn-mode-evidencia.active {
    background: #2563eb !important;
    border: 1px solid #2563eb !important;
    color: white !important;
}

.btn-mode-evidencia:not(.active) {
    background: #1e293b !important;
    border: 1px solid #2563eb !important;
    color: #94a3b8 !important;
}

.btn-mode-toa.active {
    background: #22c55e !important;
    border: 1px solid #22c55e !important;
    color: white !important;
}

.btn-mode-toa:not(.active) {
    background: #1e293b !important;
    border: 1px solid #22c55e !important;
    color: #94a3b8 !important;
}

.container{
    padding:20px;
    max-width: 500px;
    margin: 0 auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

label{
    display: block;
    margin-top: 15px;
    font-size: 14px;
    color: #94a3b8;
}

input, select, textarea {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #334155;
    background: #0f172a;
    color: white;
    margin-top: 5px;
    box-sizing: border-box;
    text-transform: uppercase; 
    font-family: inherit;
    font-size: 14px;
}

textarea {
    resize: vertical;
    min-height: 80px;
}

input:disabled, select:disabled, textarea:disabled {
    background: #1e293b;
    border-color: #1e293b;
    color: #475569;
    cursor: not-allowed;
}

input[readonly] {
    background: #1e293b;
    border-color: #334155;
    color: #94a3b8;
    cursor: not-allowed;
}

button{
    color:white;
    padding:14px 20px;
    border:none;
    border-radius:8px;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
}

.btn-primary {
    background:#2563eb;
    margin-top: 20px;
}
.btn-primary:active {
    background: #1d4ed8;
}

.btn-secondary {
    background: #475569;
    margin-top: 10px;
}
.btn-secondary:active {
    background: #334155;
}

.btn-warning {
    background: #f59e0b;
    margin-top: 10px;
}
.btn-warning:active {
    background: #d97706;
}
.btn-warning:disabled {
    background: #78350f;
    cursor: not-allowed;
    opacity: 0.8;
}

.btn-success {
    background: #22c55e;
    margin-top: 30px;
}
.btn-success:active {
    background: #16a34a;
}
.btn-success:disabled {
    background: #1e3a1e;
    color: #4b5563;
    cursor: not-allowed;
    opacity: 0.6;
}

.preview-container {
    margin-top: 20px;
}

.preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.thumb-preview {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid #334155;
}

.geo-badge {
    display: none;
    background: #0f172a;
    border: 1px dashed #334155;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 14px;
    color: #38bdf8;
}

.alert-success {
    display: none;
    background: #065f46;
    border: 1px solid #059669;
    color: #a7f3d0;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <span>📷 Aplicativo de Evidências</span>
    <div class="header-actions">
        <button id="btn-modo-evidencia" class="btn-mode btn-mode-evidencia">EVIDÊNCIA 🏠</button>
        <button id="btn-modo-toa" class="btn-mode btn-mode-toa">RETIRADO FORA TOA 🚫</button>
        <a href="/gerencial.html" class="btn-navigation">Painel Gerencial 📊</a>
    </div>
</div>

<div class="container">

<div class="card">
<h2 id="titulo-pagina">Nova Evidência</h2>

<!-- Login do Técnico -->
<label>Login do Técnico</label>
<input id="input-tecnico" placeholder="DIGITE SEU LOGIN">

<!-- Cidade Autocomplete -->
<label>Cidade</label>
<input id="input-cidade" list="lista-cidades" placeholder="SELECIONE A CIDADE">
<datalist id="lista-cidades"></datalist>

<!-- Nome da Empresa (Leitura Dinâmica) -->
<label>Nome da Empresa</label>
<input id="input-empresa" placeholder="SELECIONE A CIDADE PARA PREENCHER" readonly>

<!-- Contrato -->
<label>Contrato</label>
<input id="input-contrato" placeholder="DIGITE O CONTRATO">

<!-- Bloco CA ID (Aparece apenas no modo TOA) -->
<div id="wrapper-ca-id" style="display:none;">
    <label>CA ID do Equipamento (12 dígitos)</label>
    <input id="input-ca-id" inputmode="numeric" pattern="[0-9]*" maxlength="12" placeholder="CA ID IDENTIFICADO OU DIGITADO">
</div>

<!-- Bloco Código de Baixa (Pode ser ocultado) -->
<div id="wrapper-codigo-baixa">
    <label>Código de Baixa</label>
    <input id="input-codigo-baixa" inputmode="numeric" pattern="[0-9]*" placeholder="DIGITE APENAS NÚMEROS DO CÓDIGO">
</div>

<!-- Bloco Janela de Serviço (Pode ser ocultado) -->
<div id="wrapper-janela">
    <label>Janela</label>
    <select id="select-janela">
        <option value="">SELECIONE A JANELA DE ATENDIMENTO</option>
        <option value="08HRS-11HRS">08HRS-11HRS</option>
        <option value="11HRS-14HRS">11HRS-14HRS</option>
        <option value="14HRS-17HRS">14HRS-17HRS</option>
        <option value="08HRS-12HRS">08HRS-12HRS</option>
        <option value="12HRS-18HRS">12HRS-18HRS</option>
        <option value="08HRS-22HRS">08HRS-22HRS</option>
    </select>
</div>

<!-- Inputs ocultos para Câmera e Galeria -->
<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="gallery-input" accept="image/*" multiple style="display:none;">

<!-- Botões de Ação -->
<button id="btn-tirar-foto" class="btn-primary">FOTO DA RESIDÊNCIA</button>
<button id="btn-galeria" class="btn-secondary">PRINT LIGAÇÃO PARA O CLIENTE</button>

<!-- Área de visualização do resultado -->
<div class="preview-container">
    <div id="geo-info" class="geo-badge"></div>
    <button id="btn-atualizar-gps" class="btn-warning" style="display:none;">⚠️ ATUALIZAR GEOLOCALIZAÇÃO</button>
    <div id="preview-grid" class="preview-grid"></div>
</div>

<!-- Campo de Observações -->
<label>Observações</label>
<textarea id="input-observacao" placeholder="DIGITE UMA OBSERVAÇÃO (OPCIONAL)"></textarea>

<!-- Botão Salvar (Inicia desabilitado) -->
<button id="btn-salvar" class="btn-success" disabled>SALVAR EVIDÊNCIA</button>
<div id="alert-save" class="alert-success"></div>

</div>

</div>

const btnModoEvidencia = document.getElementById('btn-modo-evidencia');
const btnModoToa = document.getElementById('btn-modo-toa');

const cameraInput = document.getElementById('camera-input');
const galleryInput = document.getElementById('gallery-input');

const previewGrid = document.getElementById('preview-grid');
const geoInfo = document.getElementById('geo-info');
const alertSave = document.getElementById('alert-save');

const inputTecnico = document.getElementById('input-tecnico');
const inputEmpresa = document.getElementById('input-empresa');
const inputCidade = document.getElementById('input-cidade');
const inputContrato = document.getElementById('input-contrato');
const inputCaId = document.getElementById('input-ca-id');

const inputCodigoBaixa = document.getElementById('input-codigo-baixa');

const wrapperJanela = document.getElementById('wrapper-janela');
const inputObservacao = document.getElementById('input-observacao');
const tituloPagina = document.getElementById('titulo-pagina');

const selectJanela = document.getElementById('select-janela');
const listaCidadesDatalist = document.getElementById('lista-cidades');

let listaImagens = [];
let localizacaoAtual = null;
let enderecoAtual = "Não disponível";
let modoRetiradoForaToa = false;
let buscaMetadadosPromise = null;

// --- CONTROLE DE ALTERNÂNCIA DE MODO ---
function alternarModo(modo) {
    if (modo === 'toa') {
        modoRetiradoForaToa = true;
        localStorage.setItem('modo_ativo', 'toa');
        
        btnModoEvidencia.classList.remove('active');
        btnModoToa.classList.add('active');
        
        btnTirarFoto.textContent = "FOTO DA ETIQUETA DO EQUIPAMENTO";
        tituloPagina.textContent = "Novo Retirado Fora TOA";
        
        wrapperCodigoBaixa.style.display = 'none';
        wrapperJanela.style.display = 'none'; 
        btnGaleria.style.display = 'none';    
        wrapperCaId.style.display = 'block';  
        
        inputCodigoBaixa.value = ""; 
        selectJanela.value = ""; 
    } else {
        modoRetiradoForaToa = false;
        localStorage.setItem('modo_ativo', 'evidencia');
        
        btnModoEvidencia.classList.add('active');
        btnModoToa.classList.remove('active');
        
        btnTirarFoto.textContent = "FOTO DA RESIDÊNCIA";
        tituloPagina.textContent = "Nova Evidência";
        
        wrapperCodigoBaixa.style.display = 'block';
        wrapperJanela.style.display = 'block'; 
        btnGaleria.style.display = 'block';    
        wrapperCaId.style.display = 'none';    
        
        inputCaId.value = "";
    }
    validarEstadoFormulario();
}

btnModoEvidencia.addEventListener('click', () => alternarModo('evidencia'));
btnModoToa.addEventListener('click', () => alternarModo('toa'));

// --- POPULAR DATALIST DE CIDADES NO INÍCIO ---
const cidadesUnicas = [...new Set(dadosMapeamento.map(item => item.c))].sort();
cidadesUnicas.forEach(cid => {
    const opt = document.createElement('option');
    opt.value = cid;
    listaCidadesDatalist.appendChild(opt);
});

// --- FUNÇÃO PARA ATUALIZAR A EMPRESA BASEADO NA CIDADE ---
function atualizarEmpresaPelaCidade(cidadeNome) {
    if (!cidadeNome) {
        inputEmpresa.value = '';
        localStorage.removeItem('nome_cidade');
        localStorage.removeItem('nome_empresa');
        validarEstadoFormulario();
        return;
    }

    const correspondencia = dadosMapeamento.find(item => item.c === cidadeNome);

    if (correspondencia) {
        inputEmpresa.value = correspondencia.e;
        localStorage.setItem('nome_cidade', cidadeNome);
        localStorage.setItem('nome_empresa', correspondencia.e);
    } else {
        inputEmpresa.value = '';
        localStorage.removeItem('nome_cidade');
        localStorage.removeItem('nome_empresa');
    }
    validarEstadoFormulario();
}

// --- CARREGAR CACHE DO NAVEGADOR (LocalStorage) ---
const tecnicoCache = localStorage.getItem('login_tecnico') || '';
const cityCache = localStorage.getItem('nome_cidade') || '';

inputTecnico.value = tecnicoCache.toUpperCase();

if (cidadesUnicas.includes(cityCache.toUpperCase())) {
    inputCidade.value = cityCache.toUpperCase();
    atualizarEmpresaPelaCidade(cityCache.toUpperCase());
} else {
    inputCidade.value = '';
    inputEmpresa.value = '';
    localStorage.removeItem('nome_cidade');
    localStorage.removeItem('nome_empresa');
}

const modoSalvo = localStorage.getItem('modo_ativo') || 'evidencia';
alternarModo(modoSalvo);

// --- PROCESSAMENTOS DE INPUTS ---
inputTecnico.addEventListener('input', (e) => {
    const val = e.target.value.toUpperCase();
    e.target.value = val;
    localStorage.setItem('login_tecnico', val);
    validarEstadoFormulario();
});

inputCidade.addEventListener('input', (e) => {
    const val = e.target.value.toUpperCase();
    e.target.value = val;
    atualizarEmpresaPelaCidade(val);
});

inputContrato.addEventListener('input', (e) => {
    const val = e.target.value.toUpperCase();
    e.target.value = val;
    validarEstadoFormulario();
});

inputCaId.addEventListener('input', (e) => {
    const val = e.target.value.replace(/\D/g, '');
    e.target.value = val.substring(0, 12);
    validarEstadoFormulario();
});

inputCodigoBaixa.addEventListener('input', (e) => {
    const val = e.target.value.replace(/\D/g, '');
    e.target.value = val;
    validarEstadoFormulario();
});

selectJanela.addEventListener('change', () => {
    validarEstadoFormulario();
});

inputObservacao.addEventListener('input', (e) => {
    e.target.value = e.target.value.toUpperCase();
});

// --- CONTROLE DE VALIDAÇÃO DO FORMULÁRIO ---
function validarEstadoFormulario() {
    const contrato = inputContrato.value.trim();
    const codigoBaixa = inputCodigoBaixa.value.trim();
    const cidade = inputCidade.value.trim();
    const tecnico = inputTecnico.value.trim();
    const empresa = inputEmpresa.value.trim();
    const janela = selectJanela.value;
    const caId = inputCaId.value.trim();
    const temImagens = listaImagens.length > 0;
    const temGps = localizacaoAtual !== null;

    if (temImagens && !temGps) {
        btnAtualizarGps.style.display = 'block';
    } else {
        btnAtualizarGps.style.display = 'none';
    }

    const codigoBaixaValido = modoRetiradoForaToa ? true : !!codigoBaixa;
    const janelaValida = modoRetiradoForaToa ? true : !!janela;
    const caIdValido = modoRetiradoForaToa ? (caId.length === 12) : true;

    if (contrato && codigoBaixaValido && cidade && tecnico && empresa && janelaValida && caIdValido && temImagens && temGps) {
        btnSalvar.disabled = false;
    } else {
        btnSalvar.disabled = true;
    }
}

// --- RECONHECIMENTO ÓPTICO DE CARACTERES (OCR - TESSERACT CORRIGIDO) ---
async function analisarImagemOCR(base64Src) {
    if (!modoRetiradoForaToa) return; 
    
    geoInfo.style.display = 'block';
    geoInfo.textContent = "Processando OCR na etiqueta do equipamento...";
    
    try {
        const result = await Tesseract.recognize(base64Src, 'eng');
        const textoDetectado = result.data.text;
        console.log("Texto detectado pelo OCR:", textoDetectado);
        
        let caIdDetectado = null;

        // Tentativa 1: Busca baseada no prefixo "CA ID" (e variações de leitura)
        const regexComPrefixo = /(?:ca\s*id|caid|c4\s*id|ga\s*id|ca\s*1d|cald)[\s\:\-\.\=]*(\d{12})/i;
        const matchComPrefixo = textoDetectado.match(regexComPrefixo);

        if (matchComPrefixo) {
            caIdDetectado = matchComPrefixo[1];
        } else {
            // Tentativa 2: Busca por qualquer número isolado de EXATAMENTE 12 dígitos (evita o S/N de 15 dígitos)
            const regexIsolado = /\b\d{12}\b/;
            const matchIsolado = textoDetectado.match(regexIsolado);
            if (matchIsolado) {
                caIdDetectado = matchIsolado[0];
            }
        }
        
        if (caIdDetectado) {
            inputCaId.value = caIdDetectado;
            geoInfo.innerHTML = `📍 Lat: ${localizacaoAtual?.latitude || 'N/A'} | Lon: ${localizacaoAtual?.longitude || 'N/A'}<br>🏠 ${enderecoAtual}<br><span style="color:#22c55e; font-weight:bold;">✔ CA ID IDENTIFICADO: ${caIdDetectado}</span>`;
        } else {
            geoInfo.innerHTML = `📍 Lat: ${localizacaoAtual?.latitude || 'N/A'} | Lon: ${localizacaoAtual?.longitude || 'N/A'}<br>🏠 ${enderecoAtual}<br><span style="color:#f59e0b;">⚠️ CA ID não encontrado na imagem. Digite os 12 dígitos manualmente.</span>`;
        }
    } catch (error) {
        console.error("Erro na leitura OCR:", error);
    }
    validarEstadoFormulario();
}

// --- BUSCAR ENDEREÇO VIA REVERSE GEOCIDING (OSM Nominatim) ---
async function buscarEndereco(lat, lon) {
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`, {
            headers: {
                'Accept-Language': 'pt-BR',
                'User-Agent': 'AppEvidencias/1.0'
            }
        });
        if (response.ok) {
            const data = await response.json();
            
            let partesEndereco = [];
            if (data.address) {
                const rua = data.address.road || data.address.pedestrian;
                const numero = data.address.house_number;
                const bairro = data.address.suburb || data.address.neighbourhood;
                const cidade = data.address.city || data.address.town || data.address.village;
                const estado = data.address.state;

                if (rua) partesEndereco.push(numero ? `${rua}, ${numero}` : rua);
                if (bairro) partesEndereco.push(bairro);
                if (cidade) partesEndereco.push(cidade);
                if (estado) partesEndereco.push(estado);
            }
            
            return partesEndereco.length > 0 ? partesEndereco.join(' - ') : (data.display_name || "Endereço não identificado");
        }
    } catch (e) {
        console.error("Erro na busca de endereço:", e);
    }
    return "Endereço não disponível";
}

// --- DISPARAR BUSCA DE LOCALIZAÇÃO E ENDEREÇO EM SEGUNDO PLANO ---
function iniciarCapturaMetadados() {
    buscaMetadadosPromise = new Promise((resolve) => {
        if (!navigator.geolocation) {
            resolve({ gps: null, endereco: "Navegador sem suporte a GPS" });
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude.toFixed(6);
                const lon = position.coords.longitude.toFixed(6);
                const gps = { latitude: lat, longitude: lon };
                
                const endereco = await buscarEndereco(lat, lon);
                resolve({ gps, endereco });
            },
            (error) => {
                console.error(error);
                resolve({ gps: null, endereco: "Permissão de localização recusada ou indisponível" });
            },
            { enableHighAccuracy: true, timeout: 8000 }
        );
    });
}

btnAtualizarGps.addEventListener('click', () => {

    btnAtualizarGps.textContent = "BUSCANDO SATÉLITE...";

    if (navigator.geolocation) {

            async (position) => {

                geoInfo.innerHTML = `📍 Lat: ${lat} | Lon: ${lon}<br>⏳ Traduzindo endereço...`;

                btnAtualizarGps.disabled = false;

                for (let foto of fotosOriginais) {

                    });
                }
                
                validarEstadoFormulario();
            },
            (error) => {

                geoInfo.innerHTML = "⚠️ Não foi possível obter o GPS. Certifique-se de autorizar a localização do navegador.";

                btnAtualizarGps.textContent = "⚠️ ATUALIZAR GEOLOCALIZAÇÃO";
                validarEstadoFormulario();
            },

        );
    } else {
        alert("Navegador sem suporte a GPS.");
        btnAtualizarGps.disabled = false;
        btnAtualizarGps.textContent = "⚠️ ATUALIZAR GEOLOCALIZAÇÃO";
    }
});

// --- DESENHAR INFORMAÇÕES DIRETAMENTE NA FOTO (Canvas) ---
function estamparMetadadosNaFoto(base64Src, callback) {
    const img = new Image();
    img.src = base64Src;
    img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        let larguraAlvo = img.width;
        let alturaAlvo = img.height;
        const limiteDimensoes = 1600;
        
        if (larguraAlvo > limiteDimensoes || alturaAlvo > limiteDimensoes) {
            if (larguraAlvo > alturaAlvo) {
                alturaAlvo = Math.round((alturaAlvo * limiteDimensoes) / larguraAlvo);
                larguraAlvo = limiteDimensoes;
            } else {
                larguraAlvo = Math.round((larguraAlvo * limiteDimensoes) / alturaAlvo);
                alturaAlvo = limiteDimensoes;
            }
        }
        
        canvas.width = larguraAlvo;
        canvas.height = alturaAlvo;
        ctx.drawImage(img, 0, 0, larguraAlvo, alturaAlvo);
        
        const tamanhoFonte = Math.max(16, Math.round(alturaAlvo * 0.024)); 
        ctx.font = `bold ${tamanhoFonte}px sans-serif`;
        
        const textoData = `DATA/HORA: ${new Date().toLocaleString('pt-BR')}`;
        const textoGps = localizacaoAtual ? `GPS: Lat ${localizacaoAtual.latitude}, Lon ${localizacaoAtual.longitude}` : "GPS: Não disponível";
        const textoEndereco = `ENDEREÇO: ${enderecoAtual}`;
        
        const preenchimento = tamanhoFonte * 0.8;
        const larguraMaximaTexto = larguraAlvo - (preenchimento * 2);
        const alturaLinha = tamanhoFonte + 6;
        
        const linhasEndereco = [];
        const palavras = textoEndereco.split(' ');
        let linhaAtual = '';
        
        for (let n = 0; n < palavras.length; n++) {
            let inlineWord = palavras[n] + ' ';
            let metricas = ctx.measureText(linhaAtual + inlineWord);
            if (metricas.width > larguraMaximaTexto && n > 0) {
                linhasEndereco.push(linhaAtual);
                linhaAtual = inlineWord;
            } else {
                linhaAtual = inlineWord = linhaAtual + inlineWord;
            }
        }
        linhasEndereco.push(linhaAtual);
        
        const todasLinhas = [textoData, textoGps, ...linhasEndereco];
        
        const alturaFaixa = (todasLinhas.length * alturaLinha) + (preenchimento * 2);
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, alturaAlvo - alturaFaixa, larguraAlvo, alturaFaixa);
        
        ctx.fillStyle = "#ffffff";
        ctx.textBaseline = "top";
        
        let coordenadaY = alturaAlvo - alturaFaixa + preenchimento;
        todasLinhas.forEach(linha => {
            ctx.fillText(linha.trim(), preenchimento, coordenadaY);
            coordenadaY += alturaLinha;
        });
        
        const base64Marcado = canvas.toDataURL('image/jpeg', 0.8);
        callback(base64Marcado);
    };
}

function adicionarImagemNaGrade(base64Image) {
    listaImagens.push(base64Image);
    
    const img = document.createElement('img');
    img.src = base64Image;
    img.className = 'thumb-preview';
    previewGrid.appendChild(img);
    
    validarEstadoFormulario();
}

// --- CONTROLE DA CÂMERA ---
btnTirarFoto.addEventListener('click', () => {
    iniciarCapturaMetadados();
    cameraInput.click();
});

cameraInput.addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (file) {
        geoInfo.style.display = 'block';
        geoInfo.textContent = "Processando foto e recuperando dados de satélite...";

        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64Original = e.target.result;

            const metadados = await buscaMetadadosPromise;
            
            localizacaoAtual = metadados.gps;
            enderecoAtual = metadados.endereco;

            if (localizacaoAtual) {
                geoInfo.innerHTML = `📍 Lat: ${localizacaoAtual.latitude} | Lon: ${localizacaoAtual.longitude}<br>🏠 ${enderecoAtual}`;
            } else {
                geoInfo.innerHTML = `⚠️ GPS indisponível.<br>🏠 ${enderecoAtual}`;
            }

            estamparMetadadosNaFoto(base64Original, (base64Marcado) => {
                adicionarImagemNaGrade(base64Marcado);
                analisarImagemOCR(base64Original); 
            });
        }
        reader.readAsDataURL(file);
    }
    cameraInput.value = ""; 
});

// --- CONTROLE DA GALERIA ---
btnGaleria.addEventListener('click', () => {
    iniciarCapturaMetadados();
    galleryInput.click();
});

galleryInput.addEventListener('change', async (event) => {
    const files = event.target.files;
    if (files.length > 0) {
        geoInfo.style.display = 'block';
        geoInfo.textContent = "Processando fotos da galeria...";

        const metadados = await buscaMetadadosPromise;
        localizacaoAtual = metadados.gps;
        enderecoAtual = metadados.endereco;

        if (localizacaoAtual) {
            geoInfo.innerHTML = `📍 Lat: ${localizacaoAtual.latitude} | Lon: ${localizacaoAtual.longitude}<br>🏠 ${enderecoAtual}`;
        } else {
            geoInfo.innerHTML = `⚠️ GPS indisponível.<br>🏠 ${enderecoAtual}`;
        }

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            reader.onload = function(e) {
                estamparMetadadosNaFoto(e.target.result, (base64Marcado) => {
                    adicionarImagemNaGrade(base64Marcado);
                    analisarImagemOCR(e.target.result); 
                });
            }
            reader.readAsDataURL(file);
        }
    }
    galleryInput.value = ""; 
});

// --- SALVAMENTO NO AZURE ---
btnSalvar.addEventListener('click', async () => {
    const contrato = inputContrato.value.trim();
    const codigoBaixa = inputCodigoBaixa.value.trim();
    const cidade = inputCidade.value.trim();
    const tecnico = inputTecnico.value.trim();
    const empresa = inputEmpresa.value.trim();
    const janela = selectJanela.value;
    const observacao = inputObservacao.value.trim();
    const caId = inputCaId.value.trim();

    const codigoBaixaValido = modoRetiradoForaToa ? "FORA TOA" : codigoBaixa;
    const janelaValida = modoRetiradoForaToa ? "FORA TOA" : janela;

    if (!contrato || !codigoBaixaValido || !cidade || !tecnico || !empresa || !janelaValida) {
        alert("Preencha todos os campos do formulário.");
        return;
    }

    if (listaImagens.length === 0 || !localizacaoAtual) {
        alert("Certifique-se de que possui ao menos uma imagem e a geolocalização capturada.");
        return;
    }

    btnSalvar.disabled = true;
    btnSalvar.textContent = "SALVANDO DADOS NO AZURE...";
    alertSave.style.display = 'none';

    let servicoDinamico = "RETIRADA";
    if (!modoRetiradoForaToa && (janela === "08HRS-12HRS" || janela === "12HRS-18HRS")) {
        servicoDinamico = "BOX";
    } else if (modoRetiradoForaToa) {
        servicoDinamico = "FORA TOA";
    }

    const payloadEvidencia = {
        contrato: contrato,
        codigoBaixa: codigoBaixaValido, 
        cidade: cidade,
        tecnico: tecnico,
        empresa: empresa,
        servico: servicoDinamico, 
        janela: janelaValida,
        localizacao: localizacaoAtual,
        endereco: enderecoAtual,
        imagens: listaImagens,
        observacao: observacao,
        caId: modoRetiradoForaToa ? caId : null
    };

    try {
        const response = await fetch('/api/salvarEvidencia', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payloadEvidencia)
        });

        const resultado = await response.json();

        if (response.ok) {
            alertSave.style.display = 'block';
            alertSave.innerHTML = `✅ EVIDÊNCIA GRAVADA NO AZURE COM SUCESSO!<br>
                                   <span style="font-size:12px; font-weight:normal;">
                                   CONTRATO: ${contrato} | TIPO: ${servicoDinamico} | FOTOS: ${listaImagens.length}
                                   </span>`;

            inputContrato.value = "";
            inputCodigoBaixa.value = "";
            inputObservacao.value = "";
            selectJanela.value = "";
            inputCaId.value = "";
            
            listaImagens = [];
            localizacaoAtual = null;
            enderecoAtual = "Não disponível";
            previewGrid.innerHTML = "";
            geoInfo.style.display = 'none';
            
            alternarModo('evidencia');
            
            validarEstadoFormulario();
        } else {
            alert("Erro reportado pelo servidor: " + (resultado.error || "Ocorreu um erro desconhecido."));
            validarEstadoFormulario();
        }

    } catch (e) {
        console.error("Erro de conexão de rede:", e);
        alert("Erro ao conectar ao servidor do Azure.");
        validarEstadoFormulario();
    } finally {
        btnSalvar.textContent = "SALVAR EVIDÊNCIA";
        setTimeout(() => {
            alertSave.style.display = 'none';
        }, 8000);
    }
});
</script>
