<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplicativo de Evidências</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0f172a;
    color:white;
}

.header{
    background:#1e293b;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-top:10px;
}

button{
    background:#2563eb;
    color:white;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
📷 Aplicativo de Evidências
</div>

<div class="container">

<div class="card">
<h2>Nova Evidência</h2>

<label>Contrato</label>
<input placeholder="Digite o contrato">

<label>Cidade</label>
<input placeholder="Digite a cidade">

<button>Tirar Foto</button>

</div>

</div>

</body>
</html>
