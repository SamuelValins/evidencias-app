<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplicativo de Evidências</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#0f172a;
    color:white;
}

.header{
    background:#1e293b;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
    max-width: 500px;
    margin: 0 auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

label{
    display: block;
    margin-top: 15px;
    font-size: 14px;
    color: #94a3b8;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #334155;
    background: #0f172a;
    color: white;
    margin-top: 5px;
    box-sizing: border-box;
}

button{
    color:white;
    padding:14px 20px;
    border:none;
    border-radius:8px;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
}

.btn-primary {
    background:#2563eb;
    margin-top: 20px;
}
.btn-primary:active {
    background: #1d4ed8;
}
.btn-primary:disabled {
    background: #1e40af;
    cursor: not-allowed;
    opacity: 0.8;
}

.btn-secondary {
    background: #475569;
    margin-top: 10px;
}
.btn-secondary:active {
    background: #334155;
}

.btn-success {
    background: #22c55e;
    margin-top: 30px;
}
.btn-success:active {
    background: #16a34a;
}
.btn-success:disabled {
    background: #15803d;
    cursor: not-allowed;
    opacity: 0.7;
}

/* Área de visualização e grid das fotos */
.preview-container {
    margin-top: 20px;
}

.preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.thumb-preview {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid #334155;
}

.geo-badge {
    display: none;
    background: #0f172a;
    border: 1px dashed #334155;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 14px;
    color: #38bdf8;
}

/* Alerta de sucesso simulado */
.alert-success {
    display: none;
    background: #065f46;
    border: 1px solid #059669;
    color: #a7f3d0;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
📷 Aplicativo de Evidências
</div>

<div class="container">

<div class="card">
<h2>Nova Evidência</h2>

<label>Contrato</label>
<input id="input-contrato" placeholder="Digite o contrato">

<label>Cidade</label>
<input id="input-cidade" placeholder="Digite a cidade">

<!-- Inputs ocultos para Câmera e Galeria -->
<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="gallery-input" accept="image/*" multiple style="display:none;">

<!-- Botões de Ação -->
<button id="btn-tirar-foto" class="btn-primary">Tirar Foto & Capturar GPS</button>
<button id="btn-galeria" class="btn-secondary">Adicionar Evidência do Ativo (Galeria)</button>

<!-- Área de visualização do resultado -->
<div class="preview-container">
    <div id="geo-info" class="geo-badge"></div>
    <div id="preview-grid" class="preview-grid"></div>
</div>

<!-- Botão Salvar e Alerta -->
<button id="btn-salvar" class="btn-success">Salvar Evidência</button>
<div id="alert-save" class="alert-success"></div>

</div>

</div>

<script>
const btnTirarFoto = document.getElementById('btn-tirar-foto');
const btnGaleria = document.getElementById('btn-galeria');
const btnSalvar = document.getElementById('btn-salvar');

const cameraInput = document.getElementById('camera-input');
const galleryInput = document.getElementById('gallery-input');

const previewGrid = document.getElementById('preview-grid');
const geoInfo = document.getElementById('geo-info');
const alertSave = document.getElementById('alert-save');

const inputContrato = document.getElementById('input-contrato');
const inputCidade = document.getElementById('input-cidade');

let listaImagens = [];
let localizacaoAtual = null;
let enderecoAtual = "Não disponível";

// --- BUSCAR ENDEREÇO VIA REVERSE GEOCIDING (OSM Nominatim) ---
async function buscarEndereco(lat, lon) {
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`, {
            headers: {
                'Accept-Language': 'pt-BR',
                'User-Agent': 'AppEvidencias/1.0' // Identificação sugerida pelas regras de uso da API
            }
        });
        if (response.ok) {
            const data = await response.json();
            
            // Filtra e organiza um endereço mais resumido para caber melhor na foto
            let partesEndereco = [];
            if (data.address) {
                const rua = data.address.road || data.address.pedestrian;
                const numero = data.address.house_number;
                const bairro = data.address.suburb || data.address.neighbourhood;
                const cidade = data.address.city || data.address.town || data.address.village;
                const estado = data.address.state;

                if (rua) partesEndereco.push(numero ? `${rua}, ${numero}` : rua);
                if (bairro) partesEndereco.push(bairro);
                if (cidade) partesEndereco.push(cidade);
                if (estado) partesEndereco.push(estado);
            }
            
            return partesEndereco.length > 0 ? partesEndereco.join(' - ') : (data.display_name || "Endereço não identificado");
        }
    } catch (e) {
        console.error("Erro na busca de endereço:", e);
    }
    return "Falha ao buscar endereço de rede";
}

// --- DESENHAR INFORMAÇÕES DIRETAMENTE NA FOTO (Canvas) ---
function estamparMetadadosNaFoto(base64Src, callback) {
    const img = new Image();
    img.src = base64Src;
    img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        // Redimensiona imagens muito grandes para evitar travamento em dispositivos móveis
        let larguraAlvo = img.width;
        let alturaAlvo = img.height;
        const limiteDimensoes = 1600;
        
        if (larguraAlvo > limiteDimensoes || alturaAlvo > limiteDimensoes) {
            if (larguraAlvo > alturaAlvo) {
                alturaAlvo = Math.round((alturaAlvo * limiteDimensoes) / larguraAlvo);
                larguraAlvo = limiteDimensoes;
            } else {
                larguraAlvo = Math.round((larguraAlvo * limiteDimensoes) / alturaAlvo);
                alturaAlvo = limiteDimensoes;
            }
        }
        
        canvas.width = larguraAlvo;
        canvas.height = alturaAlvo;
        
        // Desenha a foto original redimensionada
        ctx.drawImage(img, 0, 0, larguraAlvo, alturaAlvo);
        
        // Configura tamanho da fonte proporcional à altura da foto
        const tamanhoFonte = Math.max(16, Math.round(alturaAlvo * 0.024)); 
        ctx.font = `bold ${tamanhoFonte}px sans-serif`;
        
        // Textos dos metadados
        const textoData = `DATA/HORA: ${new Date().toLocaleString('pt-BR')}`;
        const textoGps = localizacaoAtual ? `GPS: Lat ${localizacaoAtual.latitude}, Lon ${localizacaoAtual.longitude}` : "GPS: Não disponível";
        const textoEndereco = `ENDEREÇO: ${enderecoAtual}`;
        
        const preenchimento = tamanhoFonte * 0.8;
        const larguraMaximaTexto = larguraAlvo - (preenchimento * 2);
        const alturaLinha = tamanhoFonte + 6;
        
        // Algoritmo simples de quebra de linha para o endereço longo
        const linhasEndereco = [];
        const palavras = textoEndereco.split(' ');
        let linhaAtual = '';
        
        for (let n = 0; n < palavras.length; n++) {
            let linhaTeste = linhaAtual + palavras[n] + ' ';
            let metricas = ctx.measureText(linhaTeste);
            if (metricas.width > larguraMaximaTexto && n > 0) {
                linhasEndereco.push(linhaAtual);
                linhaAtual = palavras[n] + ' ';
            } else {
                linhaAtual = linhaTeste;
            }
        }
        linhasEndereco.push(linhaAtual);
        
        // Junta todas as linhas que serão desenhadas
        const todasLinhas = [textoData, textoGps, ...linhasEndereco];
        
        // Desenha a faixa escura semitransparente na parte inferior
        const alturaFaixa = (todasLinhas.length * alturaLinha) + (preenchimento * 2);
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, alturaAlvo - alturaFaixa, larguraAlvo, alturaFaixa);
        
        // Escreve os textos por cima da faixa escura
        ctx.fillStyle = "#ffffff";
        ctx.textBaseline = "top";
        
        let coordenadaY = alturaAlvo - alturaFaixa + preenchimento;
        todasLinhas.forEach(linha => {
            ctx.fillText(lineTextCleanup(linha), preenchimento, coordenadaY);
            coordenadaY += alturaLinha;
        });
        
        // Converte o canvas de volta para Base64 (com compressão amigável de 80%)
        const base64Marcado = canvas.toDataURL('image/jpeg', 0.8);
        callback(base64Marcado);
    };
}

// Limpa possíveis espaços vazios residuais no texto
function lineTextCleanup(str) {
    return str.trim();
}

// --- ADICIONAR IMAGEM NA GRADE VISUAL ---
function adicionarImagemNaGrade(base64Image) {
    listaImagens.push(base64Image);
    
    const img = document.createElement('img');
    img.src = base64Image;
    img.className = 'thumb-preview';
    previewGrid.appendChild(img);
}

// --- CONTROLE DA CÂMERA & GPS ---
btnTirarFoto.addEventListener('click', () => {
    btnTirarFoto.disabled = true;
    btnTirarFoto.textContent = "Obtendo GPS e Endereço...";
    geoInfo.style.display = 'block';
    geoInfo.textContent = "Aguardando sinal de GPS...";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude.toFixed(6);
                const lon = position.coords.longitude.toFixed(6);
                localizacaoAtual = { latitude: lat, longitude: lon };
                
                geoInfo.innerHTML = `📍 Lat: ${lat} | Lon: ${lon}<br>⏳ Traduzindo endereço...`;
                
                // Busca o endereço em tempo real
                enderecoAtual = await buscarEndereco(lat, lon);
                geoInfo.innerHTML = `📍 Lat: ${lat} | Lon: ${lon}<br>🏠 ${enderecoAtual}`;
                
                btnTirarFoto.disabled = false;
                btnTirarFoto.textContent = "Tirar Foto & Capturar GPS";
                
                // Dispara a câmera
                cameraInput.click();
            },
            (error) => {
                console.error(error);
                geoInfo.innerHTML = "⚠️ GPS indisponível. Verifique as permissões de localização.";
                enderecoAtual = "Localização não autorizada/indisponível";
                
                btnTirarFoto.disabled = false;
                btnTirarFoto.textContent = "Tirar Foto & Capturar GPS";
                cameraInput.click();
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    } else {
        geoInfo.textContent = "⚠️ Geolocalização não suportada.";
        enderecoAtual = "Navegador sem suporte a GPS";
        btnTirarFoto.disabled = false;
        btnTirarFoto.textContent = "Tirar Foto & Capturar GPS";
        cameraInput.click();
    }
});

cameraInput.addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            // Estampa as informações antes de adicionar na tela
            estamparMetadadosNaFoto(e.target.result, (base64Marcado) => {
                adicionarImagemNaGrade(base64Marcado);
            });
        }
        reader.readAsDataURL(file);
    }
});

// --- CONTROLE DA GALERIA ---
btnGaleria.addEventListener('click', () => {
    galleryInput.click();
});

galleryInput.addEventListener('change', (event) => {
    const files = event.target.files;
    if (files.length > 0) {
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            reader.onload = function(e) {
                // Fotos enviadas da galeria também recebem a marcação se o GPS estiver ativo
                estamparMetadadosNaFoto(e.target.result, (base64Marcado) => {
                    adicionarImagemNaGrade(base64Marcado);
                });
            }
            reader.readAsDataURL(file);
        }
    }
});

// --- SIMULAÇÃO DE SALVAMENTO ---
btnSalvar.addEventListener('click', () => {
    const contrato = inputContrato.value.trim();
    const cidade = inputCidade.value.trim();

    if (!contrato || !cidade) {
        alert("Preencha os campos de Contrato e Cidade.");
        return;
    }

    if (listaImagens.length === 0) {
        alert("Adicione pelo menos uma evidência.");
        return;
    }

    btnSalvar.disabled = true;
    btnSalvar.textContent = "Enviando evidências...";
    alertSave.style.display = 'none';

    const payloadEvidencia = {
        contrato: contrato,
        cidade: cidade,
        localizacao: localizacaoAtual,
        endereco: enderecoAtual,
        imagens: listaImagens // Envia as imagens já com a marca d'água embutida
    };

    console.log("Payload para o Backend:", payloadEvidencia);

    setTimeout(() => {
        alertSave.style.display = 'block';
        alertSave.innerHTML = `✅ Evidência Salva com Sucesso! (Simulado)<br>
                               <span style="font-size:12px; font-weight:normal;">
                               Contrato: ${contrato} | Fotos com marca d'água: ${listaImagens.length}
                               </span>`;

        // Reseta o estado geral
        inputContrato.value = "";
        inputCidade.value = "";
        listaImagens = [];
        localizacaoAtual = null;
        enderecoAtual = "Não disponível";
        previewGrid.innerHTML = "";
        geoInfo.style.display = 'none';

        btnSalvar.disabled = false;
        btnSalvar.textContent = "Salvar Evidência";

        setTimeout(() => {
            alertSave.style.display = 'none';
        }, 5000);

    }, 1500);
});
</script>

</body>
</html>
