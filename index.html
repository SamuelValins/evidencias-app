<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplicativo de Evidências</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#0f172a;
    color:white;
}

.header{
    background:#1e293b;
    padding:20px;
    font-size:24px;
    font-weight:bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.btn-navigation {
    background: #475569;
    color: white;
    padding: 8px 15px;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
}

.container{
    padding:20px;
    max-width: 500px;
    margin: 0 auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

label{
    display: block;
    margin-top: 15px;
    font-size: 14px;
    color: #94a3b8;
}

input, select {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #334155;
    background: #0f172a;
    color: white;
    margin-top: 5px;
    box-sizing: border-box;
    text-transform: uppercase; 
    font-family: inherit;
    font-size: 14px;
}

input:disabled, select:disabled {
    background: #1e293b;
    border-color: #1e293b;
    color: #475569;
    cursor: not-allowed;
}

button{
    color:white;
    padding:14px 20px;
    border:none;
    border-radius:8px;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
}

.btn-primary {
    background:#2563eb;
    margin-top: 20px;
}
.btn-primary:active {
    background: #1d4ed8;
}

.btn-secondary {
    background: #475569;
    margin-top: 10px;
}
.btn-secondary:active {
    background: #334155;
}

.btn-warning {
    background: #f59e0b;
    margin-top: 10px;
}
.btn-warning:active {
    background: #d97706;
}
.btn-warning:disabled {
    background: #78350f;
    cursor: not-allowed;
    opacity: 0.8;
}

.btn-success {
    background: #22c55e;
    margin-top: 30px;
}
.btn-success:active {
    background: #16a34a;
}
.btn-success:disabled {
    background: #1e3a1e;
    color: #4b5563;
    cursor: not-allowed;
    opacity: 0.6;
}

/* Área de visualização e grid das fotos */
.preview-container {
    margin-top: 20px;
}

.preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.thumb-preview {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid #334155;
}

.geo-badge {
    display: none;
    background: #0f172a;
    border: 1px dashed #334155;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 14px;
    color: #38bdf8;
}

/* Alerta de sucesso ou erro */
.alert-success {
    display: none;
    background: #065f46;
    border: 1px solid #059669;
    color: #a7f3d0;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <span>📷 Aplicativo de Evidências</span>
    <a href="/gerencial.html" class="btn-navigation">Painel Gerencial 📊</a>
</div>

<div class="container">

<div class="card">
<h2>Nova Evidência</h2>

<!-- Login do Técnico -->
<label>Login do Técnico</label>
<input id="input-tecnico" placeholder="DIGITE SEU LOGIN">

<!-- Nome da Empresa -->
<label>Nome da Empresa</label>
<input id="input-empresa" list="lista-empresas" placeholder="SELECIONE OU DIGITE A EMPRESA">
<datalist id="lista-empresas"></datalist>

<!-- Cidade Autocomplete -->
<label>Cidade</label>
<input id="input-cidade" list="lista-cidades" placeholder="SELECIONE A CIDADE (ESCOLHA A EMPRESA ANTES)" disabled>
<datalist id="lista-cidades"></datalist>

<!-- Contrato -->
<label>Contrato</label>
<input id="input-contrato" placeholder="DIGITE O CONTRATO">

<!-- Tipo de Serviço -->
<label>Tipo de Serviço</label>
<select id="select-servico">
    <option value="">SELECIONE O TIPO DE SERVIÇO</option>
    <option value="RETIRADA">RETIRADA</option>
    <option value="BOX">BOX</option>
</select>

<!-- Janela de Serviço (Dinamico) -->
<label>Janela</label>
<select id="select-janela" disabled>
    <option value="">SELECIONE A JANELA (ESCOLHA O SERVIÇO ANTES)</option>
</select>

<!-- Inputs ocultos para Câmera e Galeria -->
<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="gallery-input" accept="image/*" multiple style="display:none;">

<!-- Botões de Ação -->
<button id="btn-tirar-foto" class="btn-primary">Tirar Foto & Capturar GPS</button>
<button id="btn-galeria" class="btn-secondary">Adicionar Evidência do Ativo (Galeria)</button>

<!-- Área de visualização do resultado -->
<div class="preview-container">
    <div id="geo-info" class="geo-badge"></div>
    <button id="btn-atualizar-gps" class="btn-warning" style="display:none;">⚠️ Atualizar Geolocalização</button>
    <div id="preview-grid" class="preview-grid"></div>
</div>

<!-- Botão Salvar (Inicia desabilitado) -->
<button id="btn-salvar" class="btn-success" disabled>Salvar Evidência</button>
<div id="alert-save" class="alert-success"></div>

</div>

</div>

// --- FUNÇÃO PARA ATUALIZAR AS CIDADES BASEADO NA EMPRESA SELECIONADA ---
function atualizarCidadesDaEmpresa(empresaNome) {
    listaCidadesDatalist.innerHTML = '';
    
    if (!empresaNome) {
        inputCidade.disabled = true;
        inputCidade.value = '';
        return;
    }

    const cidadesFiltradas = dadosMapeamento
        .filter(item => item.e === empresaNome)
        .map(item => item.c)
        .sort();

    if (cidadesFiltradas.length > 0) {
        cidadesFiltradas.forEach(cid => {
            const opt = document.createElement('option');
            opt.value = cid;
            listaCidadesDatalist.appendChild(opt);
        });
        inputCidade.disabled = false;
    } else {
        inputCidade.disabled = true;
        inputCidade.value = '';
    }
}

    });

    selectJanela.disabled = false;

        inputCidade.value = cidadeCache.toUpperCase();
    } else {
        inputCidade.value = '';
        localStorage.removeItem('nome_cidade');
    }
}

// --- FUNÇÃO PARA CONTROLAR A ATIVAÇÃO DO BOTÃO SALVAR ---
function validarEstadoFormulario() {
    const contrato = inputContrato.value.trim();
    const cidade = inputCidade.value.trim();
    const tecnico = inputTecnico.value.trim();
    const empresa = inputEmpresa.value.trim();
    const servico = selectServico.value;
    const janela = selectJanela.value;
    const temImagens = listaImagens.length > 0;
    const temGps = localizacaoAtual !== null;

    if (temImagens && !temGps) {
        btnAtualizarGps.style.display = 'block';
    } else {
        btnAtualizarGps.style.display = 'none';
    }

    if (contrato && cidade && tecnico && empresa && servico && janela && temImagens && temGps) {
        btnSalvar.disabled = false;
    } else {
        btnSalvar.disabled = true;
    }
}

// --- BUSCAR ENDEREÇO VIA REVERSE GEOCIDING (OSM Nominatim) ---
async function buscarEndereco(lat, lon) {
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`, {
            headers: {
                'Accept-Language': 'pt-BR',
                'User-Agent': 'AppEvidencias/1.0'
            }
        });
        if (response.ok) {
            const data = await response.json();
            
            let partesEndereco = [];
            if (data.address) {
                const rua = data.address.road || data.address.pedestrian;
                const numero = data.address.house_number;
                const bairro = data.address.suburb || data.address.neighbourhood;
                const cidade = data.address.city || data.address.town || data.address.village;
                const estado = data.address.state;

                if (rua) partesEndereco.push(numero ? `${rua}, ${numero}` : rua);
                if (bairro) partesEndereco.push(bairro);
                if (cidade) partesEndereco.push(cidade);
                if (estado) partesEndereco.push(estado);
            }
            
            return partesEndereco.length > 0 ? partesEndereco.join(' - ') : (data.display_name || "Endereço não identificado");
        }
    } catch (e) {
        console.error("Erro na busca de endereço:", e);
    }
    return "Endereço não disponível";
}

// --- DISPARAR BUSCA DE LOCALIZAÇÃO E ENDEREÇO EM SEGUNDO PLANO ---
function iniciarCapturaMetadados() {
    buscaMetadadosPromise = new Promise((resolve) => {
        if (!navigator.geolocation) {
            resolve({ gps: null, endereco: "Navegador sem suporte a GPS" });
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude.toFixed(6);
                const lon = position.coords.longitude.toFixed(6);
                const gps = { latitude: lat, longitude: lon };
                
                const endereco = await buscarEndereco(lat, lon);
                resolve({ gps, endereco });
            },
            (error) => {
                console.error(error);
                resolve({ gps: null, endereco: "Permissão de localização recusada ou indisponível" });
            },
            { enableHighAccuracy: true, timeout: 8000 }
        );
    });
}

    btnAtualizarGps.disabled = true;
    btnAtualizarGps.textContent = "BUSCANDO SATÉLITE...";
    geoInfo.style.display = 'block';
    geoInfo.textContent = "Obtendo localização atual...";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude.toFixed(6);
                const lon = position.coords.longitude.toFixed(6);
                localizacaoAtual = { latitude: lat, longitude: lon };
                
                geoInfo.innerHTML = `📍 Lat: ${lat} | Lon: ${lon}<br>⏳ Traduzindo endereço...`;
                enderecoAtual = await buscarEndereco(lat, lon);
                geoInfo.innerHTML = `📍 Lat: ${lat} | Lon: ${lon}<br>🏠 ${enderecoAtual}`;
                
                btnAtualizarGps.disabled = false;
                btnAtualizarGps.textContent = "⚠️ ATUALIZAR GEOLOCALIZAÇÃO";
                
                const fotosOriginais = [...listaImagens];
                listaImagens = [];
                previewGrid.innerHTML = "";
                
                for (let foto of fotosOriginais) {
                    estamparMetadadosNaFoto(foto, (base64Marcado) => {
                        adicionarImagemNaGrade(base64Marcado);
                    });
                }
                
                validarEstadoFormulario();
            },
            (error) => {
                console.error(error);
                geoInfo.innerHTML = "⚠️ Não foi possível obter o GPS. Certifique-se de autorizar a localização do navegador.";
                btnAtualizarGps.disabled = false;
                btnAtualizarGps.textContent = "⚠️ ATUALIZAR GEOLOCALIZAÇÃO";
                validarEstadoFormulario();
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    } else {
        alert("Navegador sem suporte a GPS.");
        btnAtualizarGps.disabled = false;
        btnAtualizarGps.textContent = "⚠️ ATUALIZAR GEOLOCALIZAÇÃO";
    }
});

// --- DESENHAR INFORMAÇÕES DIRETAMENTE NA FOTO (Canvas) ---
function estamparMetadadosNaFoto(base64Src, callback) {
    const img = new Image();
    img.src = base64Src;
    img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        let larguraAlvo = img.width;
        let alturaAlvo = img.height;
        const limiteDimensoes = 1600;
        
        if (larguraAlvo > limiteDimensoes || alturaAlvo > limiteDimensoes) {
            if (larguraAlvo > alturaAlvo) {
                alturaAlvo = Math.round((alturaAlvo * limiteDimensoes) / larguraAlvo);
                larguraAlvo = limiteDimensoes;
            } else {
                larguraAlvo = Math.round((larguraAlvo * limiteDimensoes) / alturaAlvo);
                alturaAlvo = limiteDimensoes;
            }
        }
        
        canvas.width = larguraAlvo;
        canvas.height = alturaAlvo;
        ctx.drawImage(img, 0, 0, larguraAlvo, alturaAlvo);
        
        const tamanhoFonte = Math.max(16, Math.round(alturaAlvo * 0.024)); 
        ctx.font = `bold ${tamanhoFonte}px sans-serif`;
        
        const textoData = `DATA/HORA: ${new Date().toLocaleString('pt-BR')}`;
        const textoGps = localizacaoAtual ? `GPS: Lat ${localizacaoAtual.latitude}, Lon ${localizacaoAtual.longitude}` : "GPS: Não disponível";
        const textoEndereco = `ENDEREÇO: ${enderecoAtual}`;
        
        const preenchimento = tamanhoFonte * 0.8;
        const larguraMaximaTexto = larguraAlvo - (preenchimento * 2);
        const alturaLinha = tamanhoFonte + 6;
        
        const linhasEndereco = [];
        const palavras = textoEndereco.split(' ');
        let linhaAtual = '';
        
        for (let n = 0; n < palavras.length; n++) {
            let linhaTeste = linhaAtual + palavras[n] + ' ';
            let metricas = ctx.measureText(linhaTeste);
            if (metricas.width > larguraMaximaTexto && n > 0) {
                linhasEndereco.push(linhaAtual);
                linhaAtual = palavras[n] + ' ';
            } else {
                linhaAtual = linhaTeste;
            }
        }
        linhasEndereco.push(linhaAtual);
        
        const todasLinhas = [textoData, textoGps, ...linhasEndereco];
        
        const alturaFaixa = (todasLinhas.length * alturaLinha) + (preenchimento * 2);
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, alturaAlvo - alturaFaixa, larguraAlvo, alturaFaixa);
        
        ctx.fillStyle = "#ffffff";
        ctx.textBaseline = "top";
        
        let coordenadaY = alturaAlvo - alturaFaixa + preenchimento;
        todasLinhas.forEach(linha => {
            ctx.fillText(linha.trim(), preenchimento, coordenadaY);
            coordenadaY += alturaLinha;
        });
        
        const base64Marcado = canvas.toDataURL('image/jpeg', 0.8);
        callback(base64Marcado);
    };
}

function adicionarImagemNaGrade(base64Image) {
    listaImagens.push(base64Image);
    
    const img = document.createElement('img');
    img.src = base64Image;
    img.className = 'thumb-preview';
    previewGrid.appendChild(img);
    
    validarEstadoFormulario();
}

// --- CONTROLE DA CÂMERA ---
btnTirarFoto.addEventListener('click', () => {
    iniciarCapturaMetadados();
    cameraInput.click();
});

cameraInput.addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (file) {
        geoInfo.style.display = 'block';
        geoInfo.textContent = "Processando foto e recuperando dados de satélite...";

        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64Original = e.target.result;

            const metadados = await buscaMetadadosPromise;
            
            localizacaoAtual = metadados.gps;
            enderecoAtual = metadados.endereco;

            if (localizacaoAtual) {
                geoInfo.innerHTML = `📍 Lat: ${localizacaoAtual.latitude} | Lon: ${localizacaoAtual.longitude}<br>🏠 ${enderecoAtual}`;
            } else {
                geoInfo.innerHTML = `⚠️ GPS indisponível.<br>🏠 ${enderecoAtual}`;
            }

            estamparMetadadosNaFoto(base64Original, (base64Marcado) => {
                adicionarImagemNaGrade(base64Marcado);
            });
        }
        reader.readAsDataURL(file);
    }
});

// --- CONTROLE DA GALERIA ---
btnGaleria.addEventListener('click', () => {
    iniciarCapturaMetadados();
    galleryInput.click();
});

galleryInput.addEventListener('change', async (event) => {
    const files = event.target.files;
    if (files.length > 0) {
        geoInfo.style.display = 'block';
        geoInfo.textContent = "Processando fotos da galeria...";

        const metadados = await buscaMetadadosPromise;
        localizacaoAtual = metadados.gps;
        enderecoAtual = metadados.endereco;

        if (localizacaoAtual) {
            geoInfo.innerHTML = `📍 Lat: ${localizacaoAtual.latitude} | Lon: ${localizacaoAtual.longitude}<br>🏠 ${enderecoAtual}`;
        } else {
            geoInfo.innerHTML = `⚠️ GPS indisponível.<br>🏠 ${enderecoAtual}`;
        }

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            reader.onload = function(e) {
                estamparMetadadosNaFoto(e.target.result, (base64Marcado) => {
                    adicionarImagemNaGrade(base64Marcado);
                });
            }
            reader.readAsDataURL(file);
        }
    }
});

// --- SALVAMENTO REAL NO AZURE (Chamada à Azure Function) ---
btnSalvar.addEventListener('click', async () => {
    const contrato = inputContrato.value.trim();
    const cidade = inputCidade.value.trim();
    const tecnico = inputTecnico.value.trim();
    const empresa = inputEmpresa.value.trim();
    const servico = selectServico.value;
    const janela = selectJanela.value;

    if (!contrato || !cidade || !tecnico || !empresa || !servico || !janela) {
        alert("Preencha todos os campos do formulário.");
        return;
    }

    if (listaImagens.length === 0 || !localizacaoAtual) {
        alert("Certifique-se de que possui ao menos uma imagem e a geolocalização capturada.");
        return;
    }

    btnSalvar.disabled = true;
    btnSalvar.textContent = "SALVANDO DADOS NO AZURE...";
    alertSave.style.display = 'none';

    const payloadEvidencia = {
        contrato: contrato,
        cidade: cidade,
        tecnico: tecnico,
        empresa: empresa,
        servico: servico,
        janela: janela,
        localizacao: localizacaoAtual,
        endereco: enderecoAtual,
        imagens: listaImagens
    };

    try {
        const response = await fetch('/api/salvarEvidencia', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payloadEvidencia)
        });

        const resultado = await response.json();

        if (response.ok) {
            alertSave.style.display = 'block';
            alertSave.innerHTML = `✅ EVIDÊNCIA GRAVADA NO AZURE COM SUCESSO!<br>
                                   <span style="font-size:12px; font-weight:normal;">
                                   CONTRATO: ${contrato} | FOTOS ARMAZENADAS: ${listaImagens.length}
                                   </span>`;

            // Reseta contrato, fotos, serviço e janela (MANTÉM Técnico, Empresa e Cidade salvos)
            inputContrato.value = "";
            selectServico.value = "";
            atualizarOpcoesJanela(""); // Limpa e bloqueia a janela
            
            listaImagens = [];
            localizacaoAtual = null;
            enderecoAtual = "Não disponível";
            previewGrid.innerHTML = "";
            geoInfo.style.display = 'none';
            
            if (empresasUnicas.includes(inputEmpresa.value)) {
                atualizarCidadesDaEmpresa(inputEmpresa.value);
            } else {
                atualizarCidadesDaEmpresa('');
            }
            
            validarEstadoFormulario();
        } else {
            alert("Erro reportado pelo servidor: " + (resultado.error || "Ocorreu um erro desconhecido."));
            validarEstadoFormulario();
        }

    } catch (e) {
        console.error("Erro de conexão de rede:", e);
        alert("Erro ao conectar ao servidor do Azure.");
        validarEstadoFormulario();
    } finally {
        btnSalvar.textContent = "SALVAR EVIDÊNCIA";
        setTimeout(() => {
            alertSave.style.display = 'none';
        }, 8000);
    }
});
</script>
